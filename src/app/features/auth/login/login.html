<app-auth-shell
  imageSrc="assets/login.webp"
  imageAlt="Login Background"
  imagePosition="left"
  contentWidth="md"
>
  <div class="mb-16 flex scale-110 justify-center lg:scale-125">
    <app-logo />
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-10">
    @if (errorMessage()) {
      <div class="app-feedback-message app-feedback-message-danger mb-4">
        <p class="text-sm">{{ errorMessage() }}</p>
      </div>
    }

    <app-form-field id="username" label="Usuario">
      <input pInputText id="username" formControlName="username" placeholder="Ingrese usuario" />
      @if (username.touched && username.invalid) {
        <small class="app-form-error">El usuario es obligatorio</small>
      }
    </app-form-field>

    <app-form-field id="password" label="Contraseña">
      <p-password
        id="password"
        formControlName="password"
        placeholder="Ingrese contraseña"
        [toggleMask]="true"
        [feedback]="false"
        fluid
      />
      @if (password.touched && password.invalid) {
        <small class="app-form-error">La contraseña es obligatoria</small>
      }

      <div class="mt-2 flex justify-end pr-1">
        <a routerLink="/reset-password" class="app-form-meta-link">Recuperar contraseña</a>
      </div>
    </app-form-field>

    <div class="mt-6 flex justify-center">
      <p-button
        type="submit"
        label="INGRESAR"
        [disabled]="loginForm.invalid || isLoading()"
        [loading]="isLoading()"
        [pt]="{ root: { class: 'h-14 w-56' } }"
      />
    </div>
  </form>
</app-auth-shell>
