<div class="flex flex-col gap-6">

  <h1 class="text-2xl font-bold tracking-wide text-surface-700">
    {{ esNuevo() ? 'NUEVO EXAMEN' : 'DETALLE DE EXAMEN' }}
  </h1>

  <!-- Tabs -->
  <div class="flex gap-3 flex-wrap">
    @for (tab of tabs; track tab.slug) {
      @if (esNuevo() && tab.slug !== 'configuracion') {
        <button
          disabled
          class="px-8 py-2.5 rounded text-sm font-semibold bg-surface-200 text-surface-400 cursor-not-allowed"
        >
          {{ tab.label }}
        </button>
      } @else {
        <a
          [routerLink]="tab.slug"
          routerLinkActive
          #rla="routerLinkActive"
          [class]="rla.isActive
            ? 'px-8 py-2.5 rounded text-sm font-semibold bg-primary text-white'
            : 'px-8 py-2.5 rounded text-sm font-semibold bg-surface-200 text-surface-600 hover:bg-surface-300 transition-colors'"
        >
          {{ tab.label }}
        </a>
      }
    }
  </div>

  <router-outlet />

</div>
